name: Build and Release

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

jobs:
  build:
    name: ${{ matrix.os }} (${{ matrix.target }}-${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest,     arch: arm64, target: mac }
          - { os: ubuntu-latest,    arch: x64,   target: linux }
          - { os: ubuntu-latest,    arch: arm64, target: linux }
          - { os: windows-11-arm,   arch: arm64, target: win }
          - { os: windows-latest,   arch: x64,   target: win }

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Set up QEMU (Linux ARM64)
        if: matrix.target == 'linux' && matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v4

      - name: Install dependencies
        run: yarn install --ignore-scripts
        shell: bash

      - name: Install native dependencies
        run: npx electron-builder install-app-deps
        shell: bash

      - name: Create .env
        run: |
          echo "UNSPLASH_ACCESS_KEY=${{ secrets.UNSPLASH_ACCESS_KEY }}" > .env
          echo "GH_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> .env
        shell: bash

      - name: Build
        run: NODE_OPTIONS=--openssl-legacy-provider yarn build
        shell: bash

      - name: Package
        run: npx electron-builder build --${{ matrix.target }} --${{ matrix.arch }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        shell: bash

      - name: Verify code signature (macOS)
        if: matrix.target == 'mac' && github.ref == 'refs/heads/master'
        shell: bash
        run: |
          APP=$(find release -name "*.app" -type d | head -1)
          if [ -n "$APP" ]; then
            echo "=== App bundle: $APP ==="
            echo "--- Contents ---"
            ls -la "$APP/Contents/"
            ls -la "$APP/Contents/Resources/"
            echo "--- Preload check ---"
            ls -la "$APP/Contents/Resources/app/" 2>/dev/null || echo "No app dir in Resources"
            echo "--- Code signature ---"
            codesign -dvvv "$APP" 2>&1 || echo "No signature found"
          else
            echo "No .app bundle found in release/"
            ls -la release/
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.target }}-${{ matrix.arch }}
          path: |
            release/*.dmg
            release/*.blockmap
            release/*.AppImage
            release/*.exe
            release/latest*.yml
          if-no-files-found: ignore

  release:
    name: Create Release
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Get package version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: release

      - name: List artifacts
        run: find release -type f | sort

      - name: Delete old release
        continue-on-error: true
        run: gh release delete v${{ steps.pkg.outputs.version }} --yes --cleanup-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: v${{ steps.pkg.outputs.version }}
          tag_name: v${{ steps.pkg.outputs.version }}
          files: |
            release/**/*.dmg
            release/**/*.blockmap
            release/**/*.AppImage
            release/**/*.exe
            release/**/latest*.yml
          body: |
            Unsplash Wallpapers v${{ steps.pkg.outputs.version }}

            | Platform | Architecture | Download |
            |----------|-------------|----------|
            | macOS | ARM64 | `.dmg` |
            | Linux | x86_64 | `.AppImage` |
            | Linux | ARM64 | `.AppImage` |
            | Windows | x86_64 | `.exe` |
            | Windows | ARM64 | `.exe` |

            Built from [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
