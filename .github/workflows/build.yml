name: Build and Release

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --ignore-scripts

      - name: Install native dependencies
        run: npx electron-builder install-app-deps

      - name: Create .env
        run: |
          echo "UNSPLASH_ACCESS_KEY=${{ secrets.UNSPLASH_ACCESS_KEY }}" > .env
          echo "GH_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> .env

      - name: Build
        run: NODE_OPTIONS=--openssl-legacy-provider yarn build

      - name: Package
        run: npx electron-builder build --mac --arm64 --publish ${{ startsWith(github.ref, 'refs/tags/') && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete old continuous release
        if: github.ref == 'refs/heads/master'
        continue-on-error: true
        run: gh release delete continuous --yes --cleanup-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          name: Continuous Build
          tag_name: continuous
          prerelease: true
          make_latest: false
          files: release/*.dmg
          body: |
            Automated build from master branch (`${{ github.sha }}`).

            Commit: [${{ github.event.head_commit.message }}](${{ github.event.head_commit.url }})
