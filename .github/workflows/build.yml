name: Build and Release

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --ignore-scripts

      - name: Install native dependencies
        run: npx electron-builder install-app-deps

      - name: Create .env
        run: |
          echo "UNSPLASH_ACCESS_KEY=${{ secrets.UNSPLASH_ACCESS_KEY }}" > .env
          echo "GH_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> .env
          echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> .env

      - name: Build
        run: NODE_OPTIONS=--openssl-legacy-provider yarn build

      - name: Package
        run: npx electron-builder build --mac --arm64 --publish ${{ startsWith(github.ref, 'refs/tags/') && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: unsplash-wallpapers-mac-arm64
          path: release/*.dmg
